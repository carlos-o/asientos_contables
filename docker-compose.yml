services:
  db:
    image: postgres:latest
    volumes:
      - ./data/db:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - 5433:5432
    container_name: postgres_accounting_entries
  
  # Django Application
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - 8000:8000
    image: app:django_accounting_entries
    container_name: django_accounting_entries
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./.env
    depends_on:
      - db